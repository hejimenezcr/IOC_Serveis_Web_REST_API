<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestió de Tasques</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <!-- SweetAlert -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Toastr -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/css/toastr.min.css" rel="stylesheet"/>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/js/toastr.min.js"></script>

    <script src="app.js" defer></script>
</head>

<body class="bg-light">

<div class="container d-flex justify-content-center align-items-center min-vh-100">
    <div class="card p-4" style="width: 400px;">
        <h3 class="text-center mb-3 text-primary">Llista de Tasques</h3>

        <div id="connection" class="text-center mb-3">
            Connexió: <i class="fa-solid fa-thumbs-up"></i>
        </div>

        <div class="input-group mb-3">
            <input type="text" id="taskInput" class="form-control" placeholder="Afegeix una tasca">
            <button class="btn btn-primary" onclick="addTask()">
                <i class="fas fa-plus"></i>
            </button>
        </div>

        <ul class="list-group" id="taskList"></ul>
    </div>
</div>

</body>
</html>
