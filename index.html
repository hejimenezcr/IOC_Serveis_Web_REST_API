<!DOCTYPE html>
<html lang="ca">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initialscale=1.0">
        <title>OpenLib Bootstrap | Cercador de Llibres</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>
    <body class="bg-light">
        <header class="bg-primary text-white text-center py-5 shadow">
            <div class="container">
                <h1 class="display-4 fw-bold">OpenLib Explorer</h1>
                <p class="lead">Projecte de dades obertes amb l’APId’Open Library</p>
            </div>
        </header>
        <main class="container my-5">
            <div class="card shadow-sm border-0 mb-5 p-4">
                <div class="row g-3">
                    <div class="col-md-4">
                        <label class="form-label fw-semibold">Títol</label>
                        <input type="text" id="q-title" clacontrol" placeholder="Ex: Don Quijote">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-semibold">Autor</label>
                        <input type="text" id="q-author" class="form-control" placeholder="Ex: Cervantes">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-semibold">Temàtica</label>
                        <input type="text" id="q-subject" class="form-control" placeholder="Ex: History">
                    </div>
                </div>
                <button class="btn btn-primary mt-4 py-2 fw-bold"onclick="novaCerca()">Cerca a la Biblioteca Mundial</button>
            </div>
 
            <div id="status-area" class="text-center mb-4 text-muted"></div>
            <div id="results-grid" class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-4"></div>
            <nav class="mt-5">
                <ul id="pagination-list" class="pagination justifycontent-center"></ul>
            </nav>
        </main>
 
        <div class="modal fade" id="bookModal" tabindex="-1" ariahidden="true">
            <div class="modal-dialog modal-lg">
                <div class="modal-content shadow-lg border-0">
                    <div class="modal-header bg-dark text-white">
                        <h5 class="modal-title" id="modalTitle">Detall del llibre</h5>
                        <button type="button" class="btn-close btnclose-white" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body" id="modal-body-content"></div>
                </div>
            </div>
        </div>
 
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
        <script src="app.js"></script>
    </body>
</html>
